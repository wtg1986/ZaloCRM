# ─────────────────────────────────────────────────────────────────────────────
# Production stack cho BACKEND (deploy elest.io / VPS Docker).
# Frontend KHÔNG nằm ở đây — deploy riêng trên Vercel (thư mục frontend/).
#
# Chạy:  docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Biến bắt buộc trong .env.production (xem .env.production.example):
#   DB_PASSWORD, JWT_SECRET, ENCRYPTION_KEY (≥32 ký tự), MINIO_ROOT_USER/PASSWORD,
#   APP_URL (domain Vercel), S3_PUBLIC_URL (domain public của MinIO).
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: zalocrm-backend
    container_name: zalocrm-backend
    restart: unless-stopped
    ports:
      - "3000:3000" # elest.io map domain (vd api.yourdomain) → cổng này
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://${DB_USER:-crmuser}:${DB_PASSWORD}@db:5432/${DB_NAME:-zalocrm}
      - REDIS_URL=redis://redis:6379
      # CORS: domain Vercel (nhiều domain phân tách bằng dấu phẩy). Bắt buộc.
      - APP_URL=${APP_URL}
      - CORS_ALLOW_VERCEL_PREVIEW=${CORS_ALLOW_VERCEL_PREVIEW:-false}
      # Object storage (MinIO nội bộ). S3_PUBLIC_URL PHẢI là URL https công khai
      # browser + Zalo CDN truy cập được (vd https://storage.yourdomain).
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      - S3_BUCKET=${S3_BUCKET:-zalocrm-attachments}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-${MINIO_ROOT_USER}}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - file_storage:/var/lib/zalo-crm/files
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:16-alpine
    container_name: zalocrm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-crmuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: ${DB_NAME:-zalocrm}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-crmuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c max_connections=80

  redis:
    image: redis:7-alpine
    container_name: zalocrm-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save 60 1000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: zalocrm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}"
    volumes:
      - minio_data:/data
    ports:
      # Cổng 9000 (S3 API) PHẢI truy cập được từ browser + Zalo CDN. Trên elest.io
      # map 1 subdomain (vd storage.yourdomain) → cổng này, có TLS. Console 9001
      # chỉ bind loopback — KHÔNG mở ra ngoài.
      - "9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: zalocrm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${S3_BUCKET:-zalocrm-attachments};
      mc anonymous set download local/${S3_BUCKET:-zalocrm-attachments};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}"
      S3_BUCKET: ${S3_BUCKET:-zalocrm-attachments}

  backup:
    image: prodrigestivill/postgres-backup-local
    container_name: zalocrm-backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${DB_NAME:-zalocrm}
      POSTGRES_USER: ${DB_USER:-crmuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 3
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
  file_storage:
  redis_data:
  minio_data:
